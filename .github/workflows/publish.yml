name: publish

# Build the base image multi-arch (arm64 + amd64) and push it to GHCR. Runs on
# every push to main that touches the image, and on demand. Downstream repos
# pull ghcr.io/first-motive/fm-docker:humble as their FROM base.
on:
  push:
    branches: [main]
    paths:
      - Dockerfile.base
      - ros_entrypoint.sh
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build + push (humble, arm64 + amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/first-motive/fm-docker:humble
          cache-from: type=gha
          cache-to: type=gha,mode=max
