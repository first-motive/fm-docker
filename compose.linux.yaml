# Linux (native) overlay — device passthrough, X11, host networking. No GPU
# reservation here: the base container is the run-anywhere fallback for Linux
# hosts without native ROS2, so it must start on CPU-only machines. GPU access
# is a downstream concern — fm-sim / fm-learning add their own GPU overlay on
# top of this one.
services:
  fm:
    ports:
      - "8765:8765"   # foxglove_bridge
    # Robot hardware + GUI passthrough.
    devices:
      - /dev:/dev
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
